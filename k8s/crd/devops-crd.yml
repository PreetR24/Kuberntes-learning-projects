kind: CustomResourceDefinition
apiVersion: apiextensions.k8s.io/v1
metadata:
  name: devopsbatches.preet.com

spec:
  group: preet.com
  names:
    plural: devopsbatches
    singular: devopsbatch
    kind: DevOpsBatch
    shortNames:
      - junoon
      - batches
  
  scope: Namespaced
  versions: 
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec: 
            type: object
            properties:
              name:
                type: string
                description: "This is the name of the Devops batch"
              duration:
                type: string
                description: "This is the duration of the Devops batch"
              mode:
                type: string
                description: "This is the mode of the Devops batch"
              platform:
                type: string
                description: "This is the platform of the Devops batch"